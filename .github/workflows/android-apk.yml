name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0"
        required: true
        default: "1.0"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      apk_name: ${{ steps.release_meta.outputs.apk_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Install Android packages
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build release APK
        run: gradle :mobile:assembleRelease --no-daemon --stacktrace

      - name: Prepare release asset
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            raw_version="${GITHUB_REF_NAME}"
          else
            raw_version="${{ inputs.version }}"
          fi

          version="${raw_version#v}"
          tag_name="v${version}"
          apk_name="artplus-mobile-${version}.apk"

          mkdir -p release
          cp mobile/build/outputs/apk/release/mobile-release.apk "release/${apk_name}"

          {
            echo "version=${version}"
            echo "tag_name=${tag_name}"
            echo "apk_name=${apk_name}"
            echo "apk_path=release/${apk_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: artplus-mobile-${{ steps.release_meta.outputs.version }}
          path: ${{ steps.release_meta.outputs.apk_path }}

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: artplus-mobile-${{ needs.build.outputs.version }}
          path: release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.build.outputs.tag_name }}
          VERSION: ${{ needs.build.outputs.version }}
          APK_PATH: release/${{ needs.build.outputs.apk_name }}
        shell: bash
        run: |
          {
            echo "ArtPlus Android ${VERSION}"
            echo
            echo "- Built by GitHub Actions."
            echo "- Release build signed with the default Android debug signing key."
            echo "- APK: $(basename "${APK_PATH}")"
          } > release-notes.md

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${APK_PATH}" --clobber
          else
            gh release create "${TAG_NAME}" "${APK_PATH}" \
              --target "${GITHUB_SHA}" \
              --title "ArtPlus Android ${VERSION}" \
              --notes-file release-notes.md \
              --latest
          fi
